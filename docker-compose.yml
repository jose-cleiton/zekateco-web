services:
  db:
    image: mysql:8.0
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD}
      MYSQL_DATABASE: ${MYSQL_DATABASE}
      MYSQL_USER: ${MYSQL_USER}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD}
    volumes:
      - mysql_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-uroot", "-p${MYSQL_ROOT_PASSWORD}"]
      interval: 5s
      timeout: 3s
      retries: 20
    networks:
      internal:
        aliases:
          - zekateco-db

  backend:
    build:
      context: .
      dockerfile: docker/backend/Dockerfile
    restart: unless-stopped
    environment:
      DATABASE_URL: mysql://${MYSQL_USER}:${MYSQL_PASSWORD}@zekateco-db:3306/${MYSQL_DATABASE}
      PORT: 3000
      NODE_ENV: production
      # Gateway de comandos: backend chama o BACKEND Soltech DIRETO
      # (187.77.1.162:8080), sem passar pelo nginx do VPS-DB (72.62.173.226).
      # Isso evita loop quando o nginx do VPS-DB começa a rotear getrequest
      # de volta pra nós (webdriver mode pra REPs que ainda apontam pro
      # domínio api.ultraponto.ultrasistech.com.br).
      SOLTECH_GATEWAY_URL: http://187.77.1.162:8080
      # S3 — fotos biométricas
      S3_BUCKET: ${S3_BUCKET}
      S3_PREFIX: ${S3_PREFIX:-zekateco-photos}
      S3_PRESIGNED_TTL: ${S3_PRESIGNED_TTL:-3600}
      AWS_REGION: ${AWS_REGION}
      AWS_ACCESS_KEY_ID: ${AWS_ACCESS_KEY_ID}
      AWS_SECRET_ACCESS_KEY: ${AWS_SECRET_ACCESS_KEY}
      # Modo read-only: em 1, o backend rejeita mutações /api com 501 e não
      # enfileira comandos pro REP. Comandos ao REP continuam via Soltech.
      READ_ONLY: ${READ_ONLY:-1}
      # Deve ser o MESMO valor do ZEKATECO_MIRROR_SECRET no Soltech.
      MIRROR_SECRET: ${MIRROR_SECRET}
      # --- Webdriver mode via API do Soltech ---
      # Quando configurado, endpoints de comando (/api/sync-users,
      # /api/devices/:sn/reboot, etc.) chamam POST /rep/zkteco/send-command/:sn
      # do Soltech (autenticado via Keycloak) em vez de enfileirar local.
      # Sem essas envs, comandos caem no comportamento antigo (fila local, só
      # funciona pro REP que aponta pra 2.25.208.124 direto).
      SOLTECH_API_URL: ${SOLTECH_API_URL}
      KEYCLOAK_URL: ${KEYCLOAK_URL}
      KEYCLOAK_REALM: ${KEYCLOAK_REALM:-Ultraponto}
      KEYCLOAK_CLIENT_ID: ${KEYCLOAK_CLIENT_ID:-zekateco-web}
      KEYCLOAK_CLIENT_SECRET: ${KEYCLOAK_CLIENT_SECRET}
    volumes:
      - photos_data:/app/photos
    ports:
      - "3000:3000" # acesso direto ao backend p/ REP apontar enquanto o gateway Soltech nao esta no ar
    depends_on:
      db:
        condition: service_healthy
    networks:
      - internal

  frontend:
    build:
      context: .
      dockerfile: docker/frontend/Dockerfile
    restart: unless-stopped
    ports:
      - "81:80"     # dashboard local (80 do host pode estar ocupado)
      - "8080:8080" # gateway ADMS — REPs chegam aqui via domínio api.ultraponto.ultrasistech.com.br
    depends_on:
      - backend
    networks:
      - internal

volumes:
  mysql_data:
  photos_data:

networks:
  internal:
    driver: bridge
