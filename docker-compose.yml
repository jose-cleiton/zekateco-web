services:
  db:
    image: mysql:8.0
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD}
      MYSQL_DATABASE: ${MYSQL_DATABASE}
      MYSQL_USER: ${MYSQL_USER}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD}
    volumes:
      - mysql_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-uroot", "-p${MYSQL_ROOT_PASSWORD}"]
      interval: 5s
      timeout: 3s
      retries: 20
    # Alias unico evita colisao com o service "db" do compose do Soltech (mysql-db),
    # que tambem e visivel pelo backend agora que ele entrou em soltech_db_network.
    networks:
      internal:
        aliases:
          - zekateco-db

  backend:
    build:
      context: .
      dockerfile: docker/backend/Dockerfile
    restart: unless-stopped
    environment:
      DATABASE_URL: mysql://${MYSQL_USER}:${MYSQL_PASSWORD}@zekateco-db:3306/${MYSQL_DATABASE}
      PORT: 3000
      NODE_ENV: production
      # Gateway de comandos: backend chama Soltech via DNS docker antes de servir fila local.
      SOLTECH_GATEWAY_URL: http://ultraponto-api:8080
      # S3 — fotos biométricas
      S3_BUCKET: ${S3_BUCKET}
      S3_PREFIX: ${S3_PREFIX:-zekateco-photos}
      S3_PRESIGNED_TTL: ${S3_PRESIGNED_TTL:-3600}
      AWS_REGION: ${AWS_REGION}
      AWS_ACCESS_KEY_ID: ${AWS_ACCESS_KEY_ID}
      AWS_SECRET_ACCESS_KEY: ${AWS_SECRET_ACCESS_KEY}
    volumes:
      - photos_data:/app/photos
    depends_on:
      db:
        condition: service_healthy
    networks:
      - internal
      - soltech # precisa resolver ultraponto-api pra rota /iclock/getrequest

  frontend:
    build:
      context: .
      dockerfile: docker/frontend/Dockerfile
    restart: unless-stopped
    ports:
      - "81:80" # dashboard local: 80 do host esta ocupado, mantemos 81
      - "8080:8080" # gateway ADMS: REP aponta aqui; nginx faz mirror para Soltech + zekateco backend
    depends_on:
      - backend
    networks:
      - internal
      - soltech # rede compartilhada com Soltech (resolve "ultraponto-api" por DNS)

volumes:
  mysql_data:
  photos_data:

networks:
  internal:
    driver: bridge
  soltech:
    external: true
    name: soltech_db_network
