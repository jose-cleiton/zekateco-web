map $http_upgrade $connection_upgrade {
  default upgrade;
  ''      close;
}

# ============================================================================
# Server :80 — dashboard local (SPA + API + WS)
# ============================================================================
server {
  listen 80;
  server_name _;

  root /usr/share/nginx/html;
  index index.html;

  client_max_body_size 20m;
  large_client_header_buffers 8 32k;
  client_header_buffer_size 16k;

  # API REST consumida pelo dashboard (SPA).
  location /api/ {
    proxy_pass http://backend:3000;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
  }

  # ADMS endpoints — REPs ZKTeco fazem push aqui (uploads de fotos podem ser grandes).
  location /iclock/ {
    proxy_pass http://backend:3000;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_http_version 1.1;
    proxy_request_buffering off;
    client_max_body_size 20m;
  }

  # Endpoint de mirror inbound — o Soltech (nginx da VPS-API-2) envia cópia
  # de cada request ADMS aqui via `mirror` directive. Backend valida o
  # X-Mirror-Secret e reescreve internamente pra /iclock/*. Uploads podem
  # ser grandes (biophoto), por isso client_max_body_size alto.
  location /__mirror/ {
    proxy_pass http://backend:3000;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Mirror-Secret $http_x_mirror_secret;
    proxy_http_version 1.1;
    proxy_request_buffering off;
    client_max_body_size 20m;
  }

  # Fotos servidas diretamente pelo backend (Express static).
  location /photos/ {
    proxy_pass http://backend:3000;
    proxy_set_header Host $host;
  }

  # WebSocket — server.ts expoe em /ws.
  location /ws {
    proxy_pass http://backend:3000;
    proxy_http_version 1.1;
    proxy_set_header Upgrade $http_upgrade;
    proxy_set_header Connection $connection_upgrade;
    proxy_set_header Host $host;
    proxy_read_timeout 3600s;
  }

  # SPA fallback (rotas client-side).
  location / {
    try_files $uri $uri/ /index.html;
  }
}

# ============================================================================
# Server :8080 — gateway ADMS (REPs configurados pra apontar direto pra nós)
#
# Fluxo (REP → 2.25.208.124:8080):
#   /iclock/getrequest  → backend zekateco (que consulta Soltech e serve fila local)
#   /iclock/cdata|registry|ping|push → backend + mirror pro Soltech (dupla escrita)
#   /iclock/devicecmd   → backend (fecha o ciclo do C:N:CMD)
#   /*                  → passthrough Soltech (API REST, /user, /rep, etc.)
#
# Modo webdriver: nosso backend é o master pro REP. Consegue puxar users/photos,
# reiniciar, sincronizar, etc. Batidas ainda chegam no Soltech via mirror.
# ============================================================================
server {
  listen 8080;
  server_name _;

  client_max_body_size 20m;

  # getrequest vai pro backend — ele mesmo consulta Soltech via
  # SOLTECH_GATEWAY_URL e faz fallback pra fila local (queueInitialCommands).
  location = /iclock/getrequest {
    proxy_pass http://backend:3000;
    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_read_timeout 120s;
  }

  # devicecmd (ack do REP após comando) → backend fecha o ciclo (marca C:N como
  # sucesso, dispara próximas ops de sync/photo). Não precisa espelhar pro Soltech
  # porque ele nem sabe do comando (foi da nossa fila).
  location = /iclock/devicecmd {
    proxy_pass http://backend:3000;
    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_read_timeout 60s;
  }

  # /iclock/* — cdata/registry/ping/push: backend primário + mirror pro Soltech.
  # Backend processa localmente (batidas no nosso DB, fotos S3, updateDeviceSeen)
  # e o Soltech recebe cópia via subrequest (fire-and-forget) pra continuar
  # sendo source-of-truth do ponto legal.
  location /iclock/ {
    mirror /__soltech_mirror;
    mirror_request_body on;

    proxy_pass http://backend:3000;
    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_read_timeout 120s;
  }

  # Espelha /iclock/* pro Soltech (subrequest fire-and-forget).
  # Timeouts curtos: se Soltech cair, o REP nem percebe.
  location = /__soltech_mirror {
    internal;
    proxy_pass http://72.62.173.226:8080$request_uri;
    proxy_set_header Host api.ultraponto.ultrasistech.com.br;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_connect_timeout 3s;
    proxy_send_timeout 5s;
    proxy_read_timeout 5s;
    proxy_ignore_client_abort on;
  }

  # Todo o resto (API REST do Soltech: /user, /rep, /checkin, /biometric, /token, etc.)
  # é passthrough puro pro Soltech.
  location / {
    proxy_pass http://72.62.173.226:8080;
    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header Upgrade $http_upgrade;
    proxy_set_header Connection $connection_upgrade;
    proxy_read_timeout 120s;
  }
}
