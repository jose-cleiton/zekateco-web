map $http_upgrade $connection_upgrade {
  default upgrade;
  ''      close;
}

# ============================================================================
# Server :80 — dashboard local (SPA + API + WS)
# ============================================================================
server {
  listen 80;
  server_name _;

  root /usr/share/nginx/html;
  index index.html;

  client_max_body_size 20m;
  large_client_header_buffers 8 32k;
  client_header_buffer_size 16k;

  # API REST consumida pelo dashboard (SPA).
  location /api/ {
    proxy_pass http://backend:3000;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
  }

  # ADMS endpoints — REPs ZKTeco fazem push aqui (uploads de fotos podem ser grandes).
  location /iclock/ {
    proxy_pass http://backend:3000;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_http_version 1.1;
    proxy_request_buffering off;
    client_max_body_size 20m;
  }

  # Endpoint de mirror inbound — o Soltech (nginx da VPS-API-2) envia cópia
  # de cada request ADMS aqui via `mirror` directive. Backend valida o
  # X-Mirror-Secret e reescreve internamente pra /iclock/*. Uploads podem
  # ser grandes (biophoto), por isso client_max_body_size alto.
  location /__mirror/ {
    proxy_pass http://backend:3000;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Mirror-Secret $http_x_mirror_secret;
    proxy_http_version 1.1;
    proxy_request_buffering off;
    client_max_body_size 20m;
  }

  # Fotos servidas diretamente pelo backend (Express static).
  location /photos/ {
    proxy_pass http://backend:3000;
    proxy_set_header Host $host;
  }

  # WebSocket — server.ts expoe em /ws.
  location /ws {
    proxy_pass http://backend:3000;
    proxy_http_version 1.1;
    proxy_set_header Upgrade $http_upgrade;
    proxy_set_header Connection $connection_upgrade;
    proxy_set_header Host $host;
    proxy_read_timeout 3600s;
  }

  # SPA fallback (rotas client-side).
  location / {
    try_files $uri $uri/ /index.html;
  }
}

# ============================================================================
# Server :8080 — gateway ADMS (REP aponta aqui via DNS)
# api.ultraponto.ultrasistech.com.br:8080 → 2.25.208.124 → este server
#
# Fluxo:
#   /iclock/getrequest  → DIRETO pro Soltech (só ele comanda o REP)
#   /iclock/*           → Soltech (resposta ao REP) + mirror pro backend (dashboard)
#   /*                  → Soltech (API REST, /user, /rep, /checkin, /biometric, etc)
#
# Read-only por rede: o backend zekateco não recebe getrequest, então mesmo que
# tivesse comandos enfileirados eles nunca chegariam no REP. O Soltech é o
# único caminho de comando.
#
# Sem fallback pro backend local: se o Soltech cai, o REP recebe 502 e re-tenta
# (comportamento IDÊNTICO ao de hoje quando ele fala direto com o Soltech).
# ============================================================================
server {
  listen 8080;
  server_name _;

  client_max_body_size 20m;

  # getrequest vai DIRETO pro Soltech: só ele comanda o REP.
  # Match exato tem prioridade sobre `location /iclock/` abaixo.
  location = /iclock/getrequest {
    proxy_pass http://72.62.173.226:8080;
    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_read_timeout 120s;
  }

  # /iclock/* — fan-out: Soltech primário (responde ao REP) + mirror pro backend
  # (cópia silenciosa alimenta o dashboard).
  location /iclock/ {
    mirror /__zk_mirror;
    mirror_request_body on;

    proxy_pass http://72.62.173.226:8080;
    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_read_timeout 120s;
  }

  # Mirror interno: encaminha cópia pro backend zekateco. Resposta descartada.
  # Se o backend cair, o mirror falha silenciosamente sem afetar o primário.
  location = /__zk_mirror {
    internal;
    proxy_pass http://backend:3000$request_uri;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_connect_timeout 2s;
    proxy_send_timeout 5s;
    proxy_read_timeout 5s;
  }

  # Todo o resto (API REST do Soltech: /user, /rep, /checkin, /biometric, /token, etc.)
  # é passthrough puro pro Soltech.
  location / {
    proxy_pass http://72.62.173.226:8080;
    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header Upgrade $http_upgrade;
    proxy_set_header Connection $connection_upgrade;
    proxy_read_timeout 120s;
  }
}
