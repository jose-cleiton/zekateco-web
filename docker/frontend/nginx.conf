map $http_upgrade $connection_upgrade {
  default upgrade;
  ''      close;
}

server {
  listen 80;
  server_name _;

  root /usr/share/nginx/html;
  index index.html;

  client_max_body_size 20m;

  # API REST consumida pelo dashboard (SPA).
  location /api/ {
    proxy_pass http://backend:3000;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
  }

  # ADMS endpoints — REPs ZKTeco fazem push aqui (uploads de fotos podem ser grandes).
  location /iclock/ {
    proxy_pass http://backend:3000;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_http_version 1.1;
    proxy_request_buffering off;
    client_max_body_size 20m;
  }

  # Fotos servidas diretamente pelo backend (Express static).
  location /photos/ {
    proxy_pass http://backend:3000;
    proxy_set_header Host $host;
  }

  # WebSocket — server.ts expoe em /ws.
  location /ws {
    proxy_pass http://backend:3000;
    proxy_http_version 1.1;
    proxy_set_header Upgrade $http_upgrade;
    proxy_set_header Connection $connection_upgrade;
    proxy_set_header Host $host;
    proxy_read_timeout 3600s;
  }

  # SPA fallback (rotas client-side).
  location / {
    try_files $uri $uri/ /index.html;
  }
}
