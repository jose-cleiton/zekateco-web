map $http_upgrade $connection_upgrade {
  default upgrade;
  ''      close;
}

# ============================================================================
# Server :80 — dashboard local (SPA + API + WS)
# ============================================================================
server {
  listen 80;
  server_name _;

  root /usr/share/nginx/html;
  index index.html;

  client_max_body_size 20m;
  large_client_header_buffers 8 32k;
  client_header_buffer_size 16k;

  # API REST consumida pelo dashboard (SPA).
  location /api/ {
    proxy_pass http://backend:3000;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
  }

  # ADMS endpoints — REPs ZKTeco fazem push aqui (uploads de fotos podem ser grandes).
  location /iclock/ {
    proxy_pass http://backend:3000;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_http_version 1.1;
    proxy_request_buffering off;
    client_max_body_size 20m;
  }

  # Endpoint de mirror inbound — o Soltech (nginx da VPS-API-2) envia cópia
  # de cada request ADMS aqui via `mirror` directive. Backend valida o
  # X-Mirror-Secret e reescreve internamente pra /iclock/*. Uploads podem
  # ser grandes (biophoto), por isso client_max_body_size alto.
  location /__mirror/ {
    proxy_pass http://backend:3000;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Mirror-Secret $http_x_mirror_secret;
    proxy_http_version 1.1;
    proxy_request_buffering off;
    client_max_body_size 20m;
  }

  # Fotos servidas diretamente pelo backend (Express static).
  location /photos/ {
    proxy_pass http://backend:3000;
    proxy_set_header Host $host;
  }

  # WebSocket — server.ts expoe em /ws.
  location /ws {
    proxy_pass http://backend:3000;
    proxy_http_version 1.1;
    proxy_set_header Upgrade $http_upgrade;
    proxy_set_header Connection $connection_upgrade;
    proxy_set_header Host $host;
    proxy_read_timeout 3600s;
  }

  # SPA fallback (rotas client-side).
  location / {
    try_files $uri $uri/ /index.html;
  }
}

# ============================================================================
# Server :8080 — gateway ADMS (REP aponta aqui)
# Primario: Soltech (ultraponto-api:8080) - quem responde ao REP.
# Mirror:   zekateco-web backend (cópia silenciosa pra dashboard local read-only).
# Fallback: se Soltech estiver fora (dev local), proxy direto pro backend zekateco
#           via resolução lazy (Docker embedded DNS em 127.0.0.11). Evita crash no
#           startup quando "ultraponto-api" não resolve.
# ============================================================================
server {
  listen 8080;
  server_name _;

  resolver 127.0.0.11 valid=10s ipv6=off;
  client_max_body_size 20m;

  # /iclock/getrequest — gateway: zekateco backend pergunta ao Soltech primeiro
  # e, se Soltech nao tiver comando, serve da fila local (edicoes do dashboard).
  # Match exato tem prioridade sobre `location /iclock/` abaixo.
  location = /iclock/getrequest {
    proxy_pass http://backend:3000;
    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_read_timeout 120s;
  }

  # /iclock/* — fan-out (todas as outras rotas: cdata, registry, push, ping, querydata, devicecmd)
  location /iclock/ {
    # mirror precisa do body inteiro buffered, entao desligamos request_buffering off aqui
    mirror /__zk_mirror;
    mirror_request_body on;

    # Primario: Soltech. Variavel força resolução lazy (não trava no boot).
    set $soltech_upstream "ultraponto-api:8080";
    proxy_pass http://$soltech_upstream;
    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_read_timeout 120s;

    # Se Soltech estiver offline (dev local), cai no backend zekateco.
    proxy_intercept_errors on;
    error_page 502 503 504 = @iclock_fallback;
  }

  location @iclock_fallback {
    proxy_pass http://backend:3000;
    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_read_timeout 120s;
  }

  # Mirror interno: encaminha pro backend zekateco. Resposta e descartada.
  location = /__zk_mirror {
    internal;
    proxy_pass http://backend:3000$request_uri;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_connect_timeout 2s;
    proxy_send_timeout 5s;
    proxy_read_timeout 5s;
    # Se zekateco-web cair, mirror falha silenciosamente sem afetar primario.
  }

  # Tudo mais (API REST do Soltech, /user, /rep, /checkin, /biometric, etc) -> passthrough Soltech
  # Variavel força resolução lazy; se Soltech offline, cai em @root_fallback.
  location / {
    set $soltech_root "ultraponto-api:8080";
    proxy_pass http://$soltech_root;
    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header Upgrade $http_upgrade;
    proxy_set_header Connection $connection_upgrade;
    proxy_read_timeout 120s;

    proxy_intercept_errors on;
    error_page 502 503 504 = @root_fallback;
  }

  location @root_fallback {
    proxy_pass http://backend:3000;
    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_read_timeout 120s;
  }
}
