name: Terraform Plan

on:
  pull_request:
    branches: [main]
    paths:
      - "terraform/**"
      - ".github/workflows/terraform-plan.yml"

permissions:
  contents: read
  pull-requests: write

jobs:
  plan:
    name: Plan
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: terraform
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: 1.7.5

      - name: Terraform fmt
        id: fmt
        run: terraform fmt -check -recursive -diff
        continue-on-error: true

      - name: Terraform Init
        id: init
        run: terraform init -no-color -input=false
        env:
          AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          AWS_REGION: ${{ secrets.AWS_REGION }}

      - name: Terraform Validate
        id: validate
        run: terraform validate -no-color

      - name: Terraform Plan
        id: plan
        run: |
          terraform plan -no-color -input=false -out=tfplan 2>&1 | tee plan_output.txt
          echo "exitcode=$?" >> $GITHUB_OUTPUT
        env:
          TF_VAR_hostinger_api_token: ${{ secrets.HOSTINGER_API_TOKEN }}
          TF_VAR_ssh_public_key: ${{ secrets.SSH_PUBLIC_KEY }}
          AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          AWS_REGION: ${{ secrets.AWS_REGION }}
        continue-on-error: true

      - name: Comment plan on PR
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const fs = require('fs');
            const plan = fs.readFileSync('terraform/plan_output.txt', 'utf8').slice(0, 60000);
            const fmt = "${{ steps.fmt.outcome }}";
            const init = "${{ steps.init.outcome }}";
            const validate = "${{ steps.validate.outcome }}";
            const planStatus = "${{ steps.plan.outcome }}";

            const body = `## Terraform Plan

            | Step | Status |
            |---|---|
            | \`terraform fmt\` | ${fmt === 'success' ? '✅' : '⚠️ formatação divergente'} |
            | \`terraform init\` | ${init === 'success' ? '✅' : '❌'} |
            | \`terraform validate\` | ${validate === 'success' ? '✅' : '❌'} |
            | \`terraform plan\` | ${planStatus === 'success' ? '✅' : '❌'} |

            <details><summary>📋 Plan completo</summary>

            \`\`\`hcl
            ${plan}
            \`\`\`

            </details>

            _Autor: @${{ github.actor }} · Commit: ${{ github.event.pull_request.head.sha }}_
            `;

            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body
            });

      - name: Fail if plan errored
        if: steps.plan.outcome != 'success'
        run: exit 1
