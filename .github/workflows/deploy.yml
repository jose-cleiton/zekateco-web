name: Deploy zekateco-web

on:
  push:
    branches: [main]
    paths-ignore:
      - "terraform/**"
      - "docs/**"
      - "*.md"
      - ".github/workflows/terraform-*.yml"
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: deploy-production
  cancel-in-progress: false

jobs:
  deploy:
    name: Deploy to srv784010
    runs-on: ubuntu-latest
    environment: production # aprovação manual (mesmo environment do terraform-apply)
    env:
      VPS_HOST: 2.25.208.124
      VPS_USER: root
      APP_PATH: /opt/zekateco-web
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Setup SSH agent
        uses: webfactory/ssh-agent@v0.9.0
        with:
          ssh-private-key: ${{ secrets.VPS_SSH_PRIVATE_KEY }}

      - name: Trust VPS host key
        run: |
          mkdir -p ~/.ssh
          ssh-keyscan -H "$VPS_HOST" >> ~/.ssh/known_hosts 2>/dev/null

      - name: Deploy via SSH
        run: |
          ssh "${VPS_USER}@${VPS_HOST}" bash -s <<'ENDSSH'
            set -euo pipefail

            APP_PATH=/opt/zekateco-web

            # Clona no primeiro deploy
            if [ ! -d "$APP_PATH/.git" ]; then
              mkdir -p "$APP_PATH"
              git clone https://github.com/${{ github.repository }}.git "$APP_PATH"
              cd "$APP_PATH"
            else
              cd "$APP_PATH"
              git fetch --all --prune
              git reset --hard origin/main
            fi

            # Rebuild dos containers apenas se algo relevante mudou
            docker compose pull || true
            docker compose up -d --build --remove-orphans

            # Status pós-deploy
            docker compose ps
            docker compose logs --tail=20 backend | tail -20
          ENDSSH

      - name: Health check — dashboard
        run: |
          sleep 15
          for i in 1 2 3 4 5; do
            code=$(curl -s -o /dev/null -w "%{http_code}" "http://${VPS_HOST}:81/" || echo "000")
            echo "Tentativa $i → HTTP $code"
            if [ "$code" = "200" ]; then exit 0; fi
            sleep 5
          done
          echo "❌ Dashboard não voltou HTTP 200 após 5 tentativas"
          exit 1

      - name: Health check — ADMS gateway
        run: |
          # Gateway agora roteia pro Soltech em 187.77.1.162 (arquitetura
          # de proxy). Basta validar que nginx está de pé e proxy funciona
          # — qualquer resposta HTTP < 500 (incluindo 4xx do Soltech) prova
          # que a cadeia REP → nginx → Soltech está viva.
          for i in 1 2 3 4 5; do
            code=$(curl -s -o /dev/null -w "%{http_code}" "http://${VPS_HOST}:8080/iclock/cdata" || echo "000")
            echo "Tentativa $i → HTTP $code"
            if [ -n "$code" ] && [ "$code" != "000" ] && [ "$code" -lt 500 ]; then exit 0; fi
            sleep 5
          done
          echo "❌ Gateway ADMS não respondeu (000 ou 5xx) após 5 tentativas"
          exit 1
